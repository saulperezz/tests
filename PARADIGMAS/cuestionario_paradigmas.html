<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuestionario · Lenguajes y Paradigmas de Programación</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── Añadir aquí un <script> por cada tema nuevo ── -->
  <script src="preguntas_p1.js"></script>
  <script src="preguntas_p2.js"></script>
  <script src="preguntas_p3.js"></script>
  <script src="preguntas_p4.js"></script>
  <script src="preguntas_p5.js"></script>
  <script src="preguntas_p6.js"></script>
  <script src="preguntas_p7.js"></script>
  <script src="preguntas_p8.js"></script>

  <script src="../_historial/historial.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const SUBJECT_KEY = "PARADIGMAS";
    const temas = window.TEMAS_PARADIGMAS || [];

    function Quiz() {
      const [activeTema, setActiveTema]     = useState(null);
      const [activeQuestions, setActiveQuestions] = useState([]);
      const [current, setCurrent]           = useState(0);
      const [selected, setSelected]         = useState(null);
      const [confirmed, setConfirmed]       = useState(false);
      const [score, setScore]               = useState(0);
      const [wrong, setWrong]               = useState([]);
      const [finished, setFinished]         = useState(false);
      const [started, setStarted]           = useState(false);
      const [reviewMode, setReviewMode]     = useState(false);
      const [historialTema, setHistorialTema] = useState([]);

      const startQuiz = (tema) => {
        const shuffled = [...tema.preguntas]
          .sort(() => Math.random() - 0.5)
          .map((q) => {
            const correctText = q.options[q.correct];
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            return { ...q, options: shuffledOptions, correct: shuffledOptions.indexOf(correctText) };
          });
        setActiveTema(tema);
        setActiveQuestions(shuffled);
        setCurrent(0);
        setSelected(null);
        setConfirmed(false);
        setScore(0);
        setWrong([]);
        setFinished(false);
        setStarted(true);
        setReviewMode(false);
      };

      const handleSelect = (idx) => {
        if (confirmed) return;
        setSelected(idx);
      };

      const handleConfirm = () => {
        if (selected === null) return;
        setConfirmed(true);
        if (selected === activeQuestions[current].correct) {
          setScore((s) => s + 1);
        } else {
          setWrong((w) => [...w, { ...activeQuestions[current], chosen: selected }]);
        }
      };

      const handleNext = () => {
        if (current + 1 >= activeQuestions.length) {
          // Calcular score final basado en respuestas incorrectas (más confiable)
          const isLastCorrect = selected === activeQuestions[current].correct;
          const numWrongTotal = wrong.length + (isLastCorrect ? 0 : 1);
          const finalScore = activeQuestions.length - numWrongTotal;

          // Guardar resultado
          window.Historial?.guardarResultado(SUBJECT_KEY, {
            temaId: activeTema.id,
            temaNombre: activeTema.nombre,
            temaNum: activeTema.tema,
            score: finalScore,
            total: activeQuestions.length,
          });

          // Cargar historial del tema actual
          const historial = window.Historial?.obtenerHistorial(SUBJECT_KEY) ?? [];
          const historialDelTema = historial
            .filter(r => r.temaId === activeTema.id)
            .slice(0, 5);
          setHistorialTema(historialDelTema);

          setFinished(true);
        } else {
          setCurrent((c) => c + 1);
          setSelected(null);
          setConfirmed(false);
        }
      };

      const q = activeQuestions[current];
      const pct = activeQuestions.length > 0
        ? Math.round(((current + (confirmed ? 1 : 0)) / activeQuestions.length) * 100)
        : 0;
      const scorePct = activeQuestions.length > 0
        ? Math.round((score / activeQuestions.length) * 100)
        : 0;
      const optionLabel = ["A", "B", "C"];

      // ── MENÚ ──
      if (!started) {
        return (
          <div style={styles.shell}>
            <div style={styles.card}>
              <a href="../index.html" style={styles.backLink}>← Inicio</a>
              <br /><br />
              <div style={styles.badge}>Ingeniería Informática</div>
              <h1 style={styles.title}>Lenguajes y Paradigmas<br />de Programación</h1>
              <div style={styles.filterLabel}>Selecciona el tema a estudiar:</div>
              <div style={styles.filterGrid}>
                {temas.map((tema, i) => (
                  <button key={i} style={styles.filterBtn} onClick={() => startQuiz(tema)}>
                    <span style={styles.filterIcon}>⚡</span>
                    <span style={styles.filterBtnText}>Práctica {tema.tema} · {tema.nombre}</span>
                    <span style={styles.filterCount}>{tema.preguntas.length} preg.</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // ── RESULTADOS ──
      if (finished) {
        const grade = scorePct >= 90 ? "Sobresaliente"
          : scorePct >= 70 ? "Notable"
          : scorePct >= 50 ? "Aprobado"
          : "Suspendido";
        const gradeColor = scorePct >= 90 ? "#4ade80"
          : scorePct >= 70 ? "#60a5fa"
          : scorePct >= 50 ? "#fbbf24"
          : "#f87171";
        return (
          <div style={styles.shell}>
            <div style={styles.card}>
              <div style={styles.badge}>Resultado final</div>
              <div style={{ ...styles.scoreCircle, borderColor: gradeColor }}>
                <span style={{ ...styles.scoreNum, color: gradeColor }}>{scorePct}%</span>
                <span style={styles.scoreSub}>{score}/{activeQuestions.length}</span>
              </div>
              <div style={{ ...styles.gradeTag, background: gradeColor }}>{grade}</div>

              {historialTema.length > 1 && (
                <div style={styles.historialSection}>
                  <div style={styles.historialLabel}>HISTORIAL · PRÁCTICA {activeTema.tema}</div>
                  <div style={styles.historialTable}>
                    {historialTema.map((record, i) => {
                      const recordGradeColor = record.pct >= 90 ? "#4ade80"
                        : record.pct >= 70 ? "#60a5fa"
                        : record.pct >= 50 ? "#fbbf24"
                        : "#f87171";
                      const isCurrentAttempt = i === 0;
                      const date = new Date(record.ts);
                      const dateStr = `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}`;

                      return (
                        <div
                          key={i}
                          style={{
                            ...styles.historialRow,
                            ...(isCurrentAttempt ? { borderLeft: `3px solid #1f6feb` } : {}),
                          }}
                        >
                          <span style={styles.historialDate}>{dateStr}</span>
                          <span style={styles.historialScore}>{record.score}/{record.total}</span>
                          <span style={{ ...styles.historialPct, color: recordGradeColor }}>
                            ● {record.pct}%
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {wrong.length > 0 && (
                <div style={styles.wrongSection}>
                  <div style={styles.wrongTitle}>Preguntas falladas ({wrong.length})</div>
                  {!reviewMode ? (
                    <button style={styles.reviewBtn} onClick={() => setReviewMode(true)}>Ver repaso</button>
                  ) : (
                    wrong.map((w, i) => (
                      <div key={i} style={styles.wrongItem}>
                        <div style={styles.wrongConcept}>{w.concept}</div>
                        <div style={styles.wrongQ}>{w.question}</div>
                        <div style={styles.wrongAns}>
                          <span style={styles.wrongChosen}>✗ Tu respuesta: {w.options[w.chosen]}</span>
                          <span style={styles.wrongCorrect}>✓ Correcta: {w.options[w.correct]}</span>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}
              <div style={styles.finishBtns}>
                <button style={styles.primaryBtn} onClick={() => startQuiz(activeTema)}>Repetir</button>
                <button style={styles.secondaryBtn} onClick={() => setStarted(false)}>Menú</button>
              </div>
            </div>
          </div>
        );
      }

      // ── PREGUNTA ──
      return (
        <div style={styles.shell}>
          <div style={styles.card}>
            <div style={styles.header}>
              <button style={styles.backBtn} onClick={() => setStarted(false)}>← Menú</button>
              <div style={styles.progress}>
                <div style={styles.progressTrack}>
                  <div style={{ ...styles.progressFill, width: `${pct}%` }} />
                </div>
                <span style={styles.progressText}>{current + 1}/{activeQuestions.length}</span>
              </div>
              <div style={styles.scoreTag}>✓ {score}</div>
            </div>

            <div style={styles.conceptChip}>
              <span style={styles.conceptNum}>{q.conceptIndex}</span>
              {q.concept}
            </div>

            <div style={styles.questionBox}>
              <p style={styles.questionText}>{q.question}</p>
            </div>

            <div style={styles.options}>
              {q.options.map((opt, i) => {
                let style = styles.option;
                if (confirmed) {
                  if (i === q.correct)                    style = { ...styles.option, ...styles.optionCorrect };
                  else if (i === selected && i !== q.correct) style = { ...styles.option, ...styles.optionWrong };
                  else                                    style = { ...styles.option, ...styles.optionDim };
                } else if (selected === i) {
                  style = { ...styles.option, ...styles.optionSelected };
                }
                return (
                  <button key={i} style={style} onClick={() => handleSelect(i)}>
                    <span style={styles.optLabel}>{optionLabel[i]}</span>
                    <span style={styles.optText}>{opt}</span>
                    {confirmed && i === q.correct && <span style={styles.tick}>✓</span>}
                    {confirmed && i === selected && i !== q.correct && <span style={styles.cross}>✗</span>}
                  </button>
                );
              })}
            </div>

            <div style={styles.actions}>
              <a href={activeTema.resumenUrl} target="_blank" style={styles.resumenLink}>
                Ver resumen
              </a>
              {!confirmed ? (
                <button
                  style={selected !== null ? styles.primaryBtn : styles.disabledBtn}
                  onClick={handleConfirm}
                  disabled={selected === null}
                >
                  Confirmar respuesta
                </button>
              ) : (
                <button style={styles.primaryBtn} onClick={handleNext}>
                  {current + 1 >= activeQuestions.length ? "Ver resultados →" : "Siguiente →"}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }
